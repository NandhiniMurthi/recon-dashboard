<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recon Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Recon Dashboard</h1>
    </header>

    <section class="stats">
        <div class="card">
            <h3>Targets</h3>
            <p id="targetCount"></p>
        </div>

        <div class="card">
            <h3>Active</h3>
            <p id="activeCount">0</p>
        </div>

        <div class="card">
            <h3>Findings</h3>
            <p>0</p>
        </div>
    </section>

    <section>
        <div class="add-target-form">
    <input
        type="text"
        id="domainInput"
        placeholder="Enter domain"
    >
    <select id="statusInput">
    <option value="Active">Active</option>
    <option value="Pending">Pending</option>
    <option value="Completed">Completed</option>
    </select>

    <button id="addTargetBtn">
        Add Target
    </button>
        </div>
    </section>
    <section>

    <div class="search-filter">

        <input
            type="text"
            id="searchInput"
            placeholder="Search by domain">

        <select id="filterStatus">
            <option value="All">All</option>
            <option value="Active">Active</option>
            <option value="Pending">Pending</option>
            <option value="Completed">Completed</option>
        </select>

    </div>

    <p id="resultCount">
        Showing 0 of 0 targets
    </p>

    </section>

    <section>
        <h2>Targets</h2>

        <div id="targetsList"></div>
    </section>

    <section>
        <h2>Recent Activity</h2>

        <ul>
            <li>Added example.com</li>
            <li>Added test.com</li>
        </ul>
    </section>

    <script src="app.js"></script>

</body>
</html>
